name: Deploy Django App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy on server
        run: |
          cd /srv/apps/CoffeeCodersWebsite
          git pull origin main
          source ccprod/bin/activate
          python3 -m pip install -r requirements.txt
